<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6p6t</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: #000; overflow-x: hidden; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    #bg-video {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
      filter: blur(18px) brightness(0.4) saturate(0.8);
      transform: scale(1.1);
    }
    .bg-overlay { position: fixed; inset: 0; z-index: 1; background: rgba(0,0,0,0.4); }

    .page {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding: 32px 16px 40px; width: 100%; max-width: 400px;
    }

    /* Cards — lighter blur */
    .card, .player-card {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .card { padding: 30px 22px 22px; text-align: center; animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }
    .player-card { padding: 18px 18px 14px; animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.07s both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    /* Avatar */
    .avatar-wrap { width: 82px; height: 82px; margin: 0 auto 15px; }
    .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; border: 2px solid rgba(255,255,255,0.15); }

    .username { font-size: 23px; font-weight: 700; color: #fff; letter-spacing: -0.5px; margin-bottom: 10px; }
    .bio { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 18px; }
    .divider { width: 100%; height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 16px; }

    /* Socials */
    .socials { display: flex; gap: 9px; justify-content: center; margin-bottom: 18px; flex-wrap: wrap; }
    .social-btn {
      display: flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 11px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.75); font-size: 13px; font-weight: 500;
      font-family: 'Inter', sans-serif; cursor: pointer; text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .social-btn:hover { background: rgba(255,255,255,0.13); transform: translateY(-1px); }
    .social-btn.discord { color: #7289da; }
    .social-btn.steam   { color: #b8d0e0; }

    /* Presence */
    .presence {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 12px 14px;
      display: flex; align-items: center; gap: 12px; text-align: left;
    }
    .p-avatar-wrap { position: relative; flex-shrink: 0; }
    .p-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; display: block; }
    .status-dot {
      position: absolute; bottom: 0; right: 0;
      width: 12px; height: 12px; border-radius: 50%;
      background: #747f8d; border: 2px solid rgba(15,15,20,0.95);
      transition: background 0.4s;
    }
    .p-info { flex: 1; min-width: 0; overflow: hidden; }
    .p-name-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9);
      margin-bottom: 4px;
    }
    .guild-tag {
      font-size: 10px; font-weight: 600;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5); padding: 1px 6px; border-radius: 5px;
      letter-spacing: 0.3px; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .guild-badge {
      width: 13px; height: 13px; border-radius: 2px;
      object-fit: contain; vertical-align: middle;
    }

    /* Scrolling status ticker */
    .p-status-wrap {
      overflow: hidden; width: 100%;
      mask-image: linear-gradient(to right, transparent 0%, black 8%, black 85%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 85%, transparent 100%);
    }
    .p-status {
      font-size: 11px; color: rgba(255,255,255,0.38);
      white-space: nowrap;
      display: inline-block;
      animation: none;
    }
    .p-status.scrolling {
      animation: marquee var(--dur, 12s) linear infinite;
    }
    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(var(--shift, -50%)); }
    }

    .views {
      margin-top: 14px; font-size: 11px; color: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }

    /* Player */
    .player-top { display: flex; align-items: center; gap: 13px; margin-bottom: 13px; }
    .album-art {
      width: 50px; height: 50px; border-radius: 10px; flex-shrink: 0;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .album-art img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    .song-info { flex: 1; min-width: 0; }
    .song-title  { font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-artist { font-size: 12px; color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

    .progress-wrap { margin-bottom: 11px; cursor: pointer; user-select: none; }
    .progress-track { width: 100%; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.12); }
    .progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg,#7c5af0,#3a8ef6); width: 0%; transition: width 0.4s linear; pointer-events: none; }
    .progress-times { display: flex; justify-content: space-between; font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 5px; }

    .controls { display: flex; align-items: center; justify-content: center; gap: 22px; margin-bottom: 14px; }
    .ctrl-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      color: rgba(255,255,255,0.55); transition: color 0.15s, transform 0.12s;
      display: flex; align-items: center; line-height: 0;
    }
    .ctrl-btn:hover { color: #fff; transform: scale(1.13); }
    .ctrl-btn.play-pause {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center; color: #fff;
    }
    .ctrl-btn.play-pause:hover { background: rgba(255,255,255,0.18); transform: scale(1.05); }

    .pl-divider { width: 100%; height: 1px; background: rgba(255,255,255,0.06); margin-bottom: 10px; }
    .playlist { display: flex; flex-direction: column; gap: 2px; }
    .pl-item {
      display: flex; align-items: center; gap: 10px; padding: 8px;
      border-radius: 10px; cursor: pointer; transition: background 0.15s;
    }
    .pl-item:hover  { background: rgba(255,255,255,0.06); }
    .pl-item.active { background: rgba(124,90,240,0.15); }
    .pl-num { font-size: 11px; color: rgba(255,255,255,0.22); width: 16px; text-align: center; flex-shrink: 0; }
    .pl-num.playing { color: #7c5af0; }
    .pl-art {
      width: 34px; height: 34px; border-radius: 7px; flex-shrink: 0;
      background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .pl-art img { width: 100%; height: 100%; object-fit: cover; border-radius: 7px; }
    .pl-info { flex: 1; min-width: 0; }
    .pl-title  { font-size: 12px; color: rgba(255,255,255,0.82); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pl-artist { font-size: 11px; color: rgba(255,255,255,0.32); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .pl-dur { font-size: 11px; color: rgba(255,255,255,0.22); flex-shrink: 0; }
  </style>
</head>
<body>

<video id="bg-video" src="https://files.catbox.moe/7b0axe.mp4" autoplay muted loop playsinline></video>
<div class="bg-overlay"></div>

<div class="page">

  <div class="card">
    <div class="avatar-wrap">
      <img class="avatar" src="https://cdn.discordapp.com/avatars/714428648777711656/f7897220b174fc89e58c85430412d871.png" alt="6p6t" />
    </div>
    <div class="username">6p6t</div>
    <div class="bio">They say wagwan, we say wagwan back 🇳🇱</div>

    <div class="socials">
      <a class="social-btn discord" href="https://discord.com/users/714428648777711656" target="_blank" rel="noopener">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Discord
      </a>
      <a class="social-btn steam" href="https://steamcommunity.com/id/6p6t" target="_blank" rel="noopener">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.031 4.524 4.527s-2.03 4.525-4.524 4.525h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.605 0 11.979 0zM7.54 18.21l-1.473-.61c.262.543.714.999 1.314 1.25 1.297.539 2.793-.076 3.332-1.375.263-.63.264-1.319.005-1.949s-.75-1.121-1.377-1.383c-.624-.26-1.29-.249-1.878-.03l1.523.63c.956.4 1.409 1.5 1.009 2.455-.397.957-1.497 1.41-2.454 1.012H7.54zm11.415-9.303c0-1.662-1.353-3.015-3.015-3.015-1.665 0-3.015 1.353-3.015 3.015 0 1.665 1.35 3.015 3.015 3.015 1.663 0 3.015-1.35 3.015-3.015zm-5.273-.005c0-1.252 1.013-2.266 2.265-2.266 1.249 0 2.266 1.014 2.266 2.266 0 1.251-1.017 2.265-2.266 2.265-1.252 0-2.265-1.014-2.265-2.265z"/></svg>
        Steam
      </a>
    </div>

    <div class="divider"></div>

    <div class="presence">
      <div class="p-avatar-wrap">
        <img class="p-avatar" src="https://cdn.discordapp.com/avatars/714428648777711656/f7897220b174fc89e58c85430412d871.png" alt="" />
        <div class="status-dot" id="statusDot"></div>
      </div>
      <div class="p-info">
        <div class="p-name-row">
          6p6t
          <span class="guild-tag" id="guildTag" style="display:none">
            <img class="guild-badge" id="guildBadge" src="" alt="" />
            <span id="guildTagText"></span>
          </span>
        </div>
        <div class="p-status-wrap">
          <span class="p-status" id="presenceStatus">Fetching...</span>
        </div>
      </div>
    </div>

    <div class="views">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <span id="viewCount">—</span> views
    </div>
  </div>

  <div class="player-card">
    <div class="player-top">
      <div class="album-art" id="albumArt">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="9"/></svg>
      </div>
      <div class="song-info">
        <div class="song-title"  id="songTitle">—</div>
        <div class="song-artist" id="songArtist">—</div>
      </div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-times">
        <span id="timeCurrent">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btnPrev" aria-label="Previous">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="btnPlay" aria-label="Play">
        <svg id="iconPlay"  width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-btn" id="btnNext" aria-label="Next">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
    </div>

    <div class="pl-divider"></div>
    <div class="playlist" id="playlist"></div>
  </div>

</div>

<audio id="audio"></audio>

<script>
  const tracks = [
    { title: 'Mosaïque', artist: 'Ash', src: 'https://files.catbox.moe/c2zny9.mp3', cover: 'https://files.catbox.moe/q3lar2.jpeg' },
    { title: 'Peaches (feat. Daniel Caesar & Giveon)', artist: 'Justin Bieber, Daniel Caesar, GIVĒON', src: 'https://files.catbox.moe/oimm4a.mp3', cover: 'https://files.catbox.moe/905k3r.jpeg' },
  ];

  const NOTE_SVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="9"/></svg>`;
  const NOTE_SM  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="9"/></svg>`;

  let current = 0, playing = false;
  const audio = document.getElementById('audio');

  // build playlist
  const plEl = document.getElementById('playlist');
  tracks.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'pl-item' + (i === 0 ? ' active' : '');
    div.innerHTML = `
      <div class="pl-num" id="plnum-${i}">${i+1}</div>
      <div class="pl-art" id="plart-${i}">${t.cover ? `<img src="${t.cover}" alt="" />` : NOTE_SM}</div>
      <div class="pl-info">
        <div class="pl-title">${t.title}</div>
        <div class="pl-artist">${t.artist}</div>
      </div>
      <div class="pl-dur" id="pldur-${i}">—</div>
    `;
    div.addEventListener('click', () => loadTrack(i, true));
    plEl.appendChild(div);
  });

  function loadTrack(index, play = false) {
    current = index;
    const t = tracks[current];
    document.getElementById('songTitle').textContent  = t.title;
    document.getElementById('songArtist').textContent = t.artist;
    const art = document.getElementById('albumArt');
    art.innerHTML = t.cover ? `<img src="${t.cover}" alt="cover" />` : NOTE_SVG;
    audio.src = t.src;

    document.querySelectorAll('.pl-item').forEach((el, i) => {
      el.classList.toggle('active', i === current);
      const num = document.getElementById('plnum-' + i);
      num.classList.toggle('playing', i === current);
      num.textContent = i === current ? '♪' : i + 1;
    });

    if (play) { audio.play(); setPlaying(true); }
    else setPlaying(false);
  }

  function setPlaying(state) {
    playing = state;
    document.getElementById('iconPlay').style.display  = state ? 'none' : '';
    document.getElementById('iconPause').style.display = state ? '' : 'none';
  }

  document.getElementById('btnPlay').addEventListener('click', () => {
    if (!audio.src) loadTrack(current, true);
    else if (playing) { audio.pause(); setPlaying(false); }
    else { audio.play(); setPlaying(true); }
  });
  document.getElementById('btnNext').addEventListener('click', () => loadTrack((current + 1) % tracks.length, playing));
  document.getElementById('btnPrev').addEventListener('click', () => {
    if (audio.currentTime > 3) audio.currentTime = 0;
    else loadTrack((current - 1 + tracks.length) % tracks.length, playing);
  });
  audio.addEventListener('ended', () => loadTrack((current + 1) % tracks.length, true));

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('timeCurrent').textContent  = fmt(audio.currentTime);
    document.getElementById('timeDuration').textContent = fmt(audio.duration);
  });

  document.getElementById('progressWrap').addEventListener('click', e => {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    if (audio.duration) audio.currentTime = pct * audio.duration;
  });

  tracks.forEach((t, i) => {
    const tmp = new Audio();
    tmp.src = t.src;
    tmp.addEventListener('loadedmetadata', () => {
      document.getElementById('pldur-' + i).textContent = fmt(tmp.duration);
    });
  });

  function fmt(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  loadTrack(0, false);

  // Views
  const vk = 'views_6p6t_v2';
  let v = parseInt(localStorage.getItem(vk) || '0') + 1;
  localStorage.setItem(vk, v);
  document.getElementById('viewCount').textContent = v;

  // Scrolling status ticker
  function applyTicker(text) {
    const el  = document.getElementById('presenceStatus');
    const wrap = el.parentElement;
    el.classList.remove('scrolling');
    el.style.removeProperty('--dur');
    el.style.removeProperty('--shift');
    el.textContent = text;

    requestAnimationFrame(() => {
      const textW = el.scrollWidth;
      const wrapW = wrap.clientWidth;
      if (textW > wrapW + 4) {
        // duplicate text so it loops seamlessly
        el.textContent = text + '     ' + text;
        const totalW = el.scrollWidth;
        const halfW  = totalW / 2;
        const speed  = 45; // px per second
        const dur    = halfW / speed;
        el.style.setProperty('--dur', dur + 's');
        el.style.setProperty('--shift', '-' + halfW + 'px');
        el.classList.add('scrolling');
      }
    });
  }

  // Discord presence
  const DISCORD_ID = '714428648777711656';
  const dot        = document.getElementById('statusDot');
  const guildTagEl = document.getElementById('guildTag');
  const guildBadge = document.getElementById('guildBadge');
  const guildText  = document.getElementById('guildTagText');

  const STATUS_COLORS = { online:'#3ba55d', idle:'#faa81a', dnd:'#ed4245', offline:'#747f8d' };

  async function fetchPresence() {
    try {
      const res  = await fetch('https://api.lanyard.rest/v1/users/' + DISCORD_ID);
      const json = await res.json();
      if (!json.success) throw new Error();
      const d = json.data;

      const status = d.discord_status || 'offline';
      dot.style.background = STATUS_COLORS[status] || STATUS_COLORS.offline;

      // guild tag + badge icon
      const pg = d.discord_user && d.discord_user.primary_guild;
      if (pg && pg.tag) {
        guildText.textContent = pg.tag;
        if (pg.badge && pg.identity_guild_id) {
          const badgeUrl = `https://cdn.discordapp.com/clan-badges/${pg.identity_guild_id}/${pg.badge}.png?size=16`;
          guildBadge.src = badgeUrl;
          guildBadge.style.display = '';
        } else {
          guildBadge.style.display = 'none';
        }
        guildTagEl.style.display = 'inline-flex';
      } else {
        guildTagEl.style.display = 'none';
      }

      // status text: custom (type 4) > spotify > game (type 0) > plain status
      const customAct = (d.activities || []).find(a => a.type === 4);
      const gameAct   = (d.activities || []).find(a => a.type === 0);
      let statusText;
      if (customAct && customAct.state) {
        statusText = customAct.state;
      } else if (d.listening_to_spotify && d.spotify) {
        statusText = '🎵 ' + d.spotify.song + ' — ' + d.spotify.artist;
      } else if (gameAct) {
        statusText = 'Playing ' + gameAct.name;
      } else {
        statusText = { online:'Online', idle:'Away', dnd:'Do Not Disturb', offline:'Offline' }[status] || 'Offline';
      }
      applyTicker(statusText);

    } catch {
      dot.style.background = STATUS_COLORS.offline;
      guildTagEl.style.display = 'none';
      applyTicker('Join discord.gg/lanyard to show live status');
    }
  }

  fetchPresence();
  setInterval(fetchPresence, 30000);
</script>
</body>
</html>
